<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>School Management Dashboard | ES Kabirizi</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="icon" href="kabirizi picsss/%C3%89cole%20Secondaire%20DE.KABIRIZI%20emblem.png" type="image/png">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ["Poppins", "Arial", "sans-serif"] },
          colors: {
            school: {
              navy: "#061b3a",
              blue: "#0b3f88",
              bright: "#1557b0",
              gold: "#d4a739",
              mist: "#eef4ff",
              ink: "#102033"
            }
          },
          boxShadow: {
            soft: "0 18px 45px rgba(8, 33, 72, 0.08)",
            lift: "0 26px 70px rgba(8, 33, 72, 0.16)"
          },
          keyframes: {
            rise: {
              "0%": { opacity: "0", transform: "translateY(16px)" },
              "100%": { opacity: "1", transform: "translateY(0)" }
            }
          },
          animation: {
            rise: "rise .55s ease both"
          }
        }
      }
    };
  </script>
  <style>
    body { font-family: "Poppins", Arial, sans-serif; }
    canvas { max-width: 100%; }
  </style>
</head>
<body class="bg-[#f7f9fd] text-school-ink">
  <div id="root"></div>

  <script type="text/babel">
    (function () {
      try {
        const session = JSON.parse(localStorage.getItem('esKabiriziAdminSession'));
        if (!session || !session.username) {
          window.location.href = 'admin.html';
        }
      } catch (error) {
        window.location.href = 'admin.html';
      }
    })();

    const { useEffect, useMemo, useRef, useState } = React;

    const navItems = [
      ["LayoutDashboard", "Overview"],
      ["UsersRound", "Students"],
      ["CalendarCheck", "Attendance"],
      ["BarChart3", "Results"],
      ["Bell", "Notices"],
      ["Settings", "Settings"]
    ];

    const students = [
      { id: "ESK-001", name: "Ishimwe Aline", className: "S4 MCB", attendance: 97, performance: 88, status: "Excellent" },
      { id: "ESK-002", name: "Niyonkuru Patrick", className: "S5 PCM", attendance: 92, performance: 81, status: "Good" },
      { id: "ESK-003", name: "Uwase Diane", className: "S3", attendance: 86, performance: 74, status: "Watch" },
      { id: "ESK-004", name: "Habimana Eric", className: "S6 HEG", attendance: 95, performance: 91, status: "Excellent" },
      { id: "ESK-005", name: "Mukamana Grace", className: "S2", attendance: 89, performance: 79, status: "Good" },
      { id: "ESK-006", name: "Twizeyimana Jean", className: "S1", attendance: 78, performance: 68, status: "Support" },
      { id: "ESK-007", name: "Ingabire Clarisse", className: "S5 PCB", attendance: 94, performance: 85, status: "Good" },
      { id: "ESK-008", name: "Nsengiyumva Claude", className: "S4 MEG", attendance: 82, performance: 72, status: "Watch" }
    ];

    const notifications = [
      { icon: "Megaphone", title: "Parent meeting confirmed", text: "Senior classes meet parents on Friday at 2:00 PM.", tone: "blue" },
      { icon: "BookOpenCheck", title: "Mock results uploaded", text: "Science and language department scores are ready for review.", tone: "gold" },
      { icon: "ShieldCheck", title: "Attendance follow-up", text: "Six students need attendance review this week.", tone: "green" }
    ];

    const calendarItems = [
      { day: "Mon", date: "08", title: "Weekly assembly", time: "7:30 AM" },
      { day: "Wed", date: "10", title: "Department review", time: "2:00 PM" },
      { day: "Fri", date: "12", title: "Staff planning", time: "3:00 PM" }
    ];

    function iconName(name) {
      return name.replace(/([a-z0-9])([A-Z])/g, "$1-$2").toLowerCase();
    }

    function Icon({ name, className = "w-5 h-5" }) {
      return <i data-lucide={iconName(name)} className={className}></i>;
    }

    function Sidebar({ active, setActive, open, setOpen }) {
      return (
        <>
          <div className={`fixed inset-0 z-30 bg-black/40 transition md:hidden ${open ? "opacity-100" : "pointer-events-none opacity-0"}`} onClick={() => setOpen(false)} />
          <aside className={`fixed inset-y-0 left-0 z-40 flex w-72 flex-col bg-school-navy p-5 text-white shadow-lift transition-transform duration-300 md:sticky md:top-0 md:h-screen md:translate-x-0 ${open ? "translate-x-0" : "-translate-x-full"}`}>
            <a href="index.html" className="flex items-center gap-3">
              <img src="kabirizi picsss/%C3%89cole%20Secondaire%20DE.KABIRIZI%20emblem.png" alt="ES Kabirizi emblem" className="h-14 w-14 rounded-full bg-white p-1.5" />
              <div>
                <p className="text-lg font-extrabold leading-tight">ES Kabirizi</p>
                <p className="text-[11px] font-bold uppercase tracking-[0.18em] text-[#f5df9f]">Management</p>
              </div>
            </a>

            <nav className="mt-8 grid gap-2">
              {navItems.map(([icon, label]) => (
                <button
                  key={label}
                  onClick={() => { setActive(label); setOpen(false); }}
                  className={`flex items-center gap-3 rounded-lg px-4 py-3 text-left text-sm font-bold transition ${active === label ? "bg-white text-school-navy shadow-soft" : "text-white/75 hover:bg-white/10 hover:text-white"}`}
                >
                  <Icon name={icon} className="h-5 w-5" />
                  {label}
                </button>
              ))}
            </nav>

            <div className="mt-auto rounded-lg border border-white/15 bg-white/10 p-4">
              <p className="text-xs font-bold uppercase tracking-[0.16em] text-[#f5df9f]">Term Focus</p>
              <p className="mt-2 text-sm leading-relaxed text-white/75">Improve attendance consistency, academic support, and parent communication.</p>
              <a href="index.html" className="mt-4 inline-flex items-center gap-2 text-sm font-bold text-[#f5df9f]">
                Website <Icon name="ArrowRight" className="h-4 w-4" />
              </a>
            </div>
          </aside>
        </>
      );
    }

    function KpiCard({ icon, label, value, change, tone }) {
      return (
        <article className="animate-rise rounded-lg border border-slate-200 bg-white p-5 shadow-soft transition hover:-translate-y-1 hover:shadow-lift">
          <div className="flex items-start justify-between gap-3">
            <div className={`grid h-12 w-12 place-items-center rounded-lg ${tone}`}>
              <Icon name={icon} className="h-6 w-6" />
            </div>
            <span className="rounded-full bg-emerald-50 px-3 py-1 text-xs font-bold text-emerald-700">{change}</span>
          </div>
          <p className="mt-5 text-sm font-semibold text-slate-500">{label}</p>
          <p className="mt-1 text-3xl font-extrabold tracking-tight text-school-navy">{value}</p>
        </article>
      );
    }

    function ChartCard({ title, subtitle, type }) {
      const canvasRef = useRef(null);
      const chartRef = useRef(null);

      useEffect(() => {
        const ctx = canvasRef.current;
        if (!ctx || !window.Chart) return;
        if (chartRef.current) chartRef.current.destroy();

        const isAttendance = type === "attendance";
        chartRef.current = new Chart(ctx, {
          type: isAttendance ? "line" : "bar",
          data: {
            labels: isAttendance ? ["Mon", "Tue", "Wed", "Thu", "Fri", "Sat"] : ["Sciences", "Math", "Languages", "ICT", "Humanities"],
            datasets: [{
              label: isAttendance ? "Attendance %" : "Average Results",
              data: isAttendance ? [91, 94, 92, 96, 95, 93] : [88, 84, 78, 81, 76],
              borderColor: "#1557b0",
              backgroundColor: isAttendance ? "rgba(21, 87, 176, 0.12)" : ["#1557b0", "#0b3f88", "#d4a739", "#1e6b49", "#8aa0bd"],
              borderWidth: 3,
              fill: isAttendance,
              tension: 0.38,
              borderRadius: 8
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: {
              x: { grid: { display: false }, ticks: { color: "#65738a", font: { family: "Poppins" } } },
              y: { beginAtZero: false, grid: { color: "rgba(12,40,82,.08)" }, ticks: { color: "#65738a", font: { family: "Poppins" } } }
            }
          }
        });

        return () => chartRef.current?.destroy();
      }, [type]);

      return (
        <article className="rounded-lg border border-slate-200 bg-white p-5 shadow-soft">
          <div className="flex items-start justify-between gap-4">
            <div>
              <p className="text-xs font-extrabold uppercase tracking-[0.16em] text-school-gold">{subtitle}</p>
              <h2 className="mt-2 text-xl font-extrabold text-school-navy">{title}</h2>
            </div>
            <button className="rounded-full border border-slate-200 p-2 text-slate-500 hover:bg-slate-50" aria-label="More chart options">
              <Icon name="MoreHorizontal" />
            </button>
          </div>
          <div className="mt-5 h-72">
            <canvas ref={canvasRef}></canvas>
          </div>
        </article>
      );
    }

    function StudentTable() {
      const [query, setQuery] = useState("");
      const [status, setStatus] = useState("All");

      const filtered = useMemo(() => {
        return students.filter((student) => {
          const matchesQuery = `${student.name} ${student.id} ${student.className}`.toLowerCase().includes(query.toLowerCase());
          const matchesStatus = status === "All" || student.status === status;
          return matchesQuery && matchesStatus;
        });
      }, [query, status]);

      return (
        <article className="rounded-lg border border-slate-200 bg-white p-5 shadow-soft">
          <div className="flex flex-col gap-4 lg:flex-row lg:items-end lg:justify-between">
            <div>
              <p className="text-xs font-extrabold uppercase tracking-[0.16em] text-school-gold">Student records</p>
              <h2 className="mt-2 text-xl font-extrabold text-school-navy">Students</h2>
            </div>
            <div className="flex flex-col gap-3 sm:flex-row">
              <label className="flex min-h-[44px] items-center gap-2 rounded-lg border border-slate-200 bg-slate-50 px-3 text-sm text-slate-500">
                <Icon name="Search" className="h-4 w-4" />
                <input value={query} onChange={(e) => setQuery(e.target.value)} placeholder="Search student" className="w-full bg-transparent outline-none sm:w-52" />
              </label>
              <select value={status} onChange={(e) => setStatus(e.target.value)} className="min-h-[44px] rounded-lg border border-slate-200 bg-white px-3 text-sm font-semibold text-slate-700 outline-none">
                {["All", "Excellent", "Good", "Watch", "Support"].map((option) => <option key={option}>{option}</option>)}
              </select>
            </div>
          </div>

          <div className="mt-5 overflow-x-auto">
            <table className="w-full min-w-[760px] border-collapse text-left text-sm">
              <thead>
                <tr className="border-b border-slate-200 text-xs uppercase tracking-[0.12em] text-slate-500">
                  <th className="py-3 pr-4">Student</th>
                  <th className="py-3 pr-4">Class</th>
                  <th className="py-3 pr-4">Attendance</th>
                  <th className="py-3 pr-4">Performance</th>
                  <th className="py-3 pr-4">Status</th>
                </tr>
              </thead>
              <tbody>
                {filtered.map((student) => (
                  <tr key={student.id} className="border-b border-slate-100 transition hover:bg-slate-50">
                    <td className="py-4 pr-4">
                      <div className="flex items-center gap-3">
                        <div className="grid h-10 w-10 place-items-center rounded-full bg-school-mist font-extrabold text-school-blue">{student.name.split(" ").map((part) => part[0]).join("")}</div>
                        <div>
                          <p className="font-bold text-school-navy">{student.name}</p>
                          <p className="text-xs text-slate-500">{student.id}</p>
                        </div>
                      </div>
                    </td>
                    <td className="py-4 pr-4 font-semibold text-slate-700">{student.className}</td>
                    <td className="py-4 pr-4">{student.attendance}%</td>
                    <td className="py-4 pr-4">{student.performance}%</td>
                    <td className="py-4 pr-4">
                      <span className={`rounded-full px-3 py-1 text-xs font-extrabold ${student.status === "Excellent" ? "bg-emerald-50 text-emerald-700" : student.status === "Good" ? "bg-blue-50 text-blue-700" : student.status === "Watch" ? "bg-amber-50 text-amber-700" : "bg-rose-50 text-rose-700"}`}>{student.status}</span>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </article>
      );
    }

    function Notifications() {
      const tones = {
        blue: "bg-blue-50 text-blue-700",
        gold: "bg-amber-50 text-amber-700",
        green: "bg-emerald-50 text-emerald-700"
      };

      return (
        <article className="rounded-lg border border-slate-200 bg-white p-5 shadow-soft">
          <div className="flex items-center justify-between">
            <div>
              <p className="text-xs font-extrabold uppercase tracking-[0.16em] text-school-gold">Communication</p>
              <h2 className="mt-2 text-xl font-extrabold text-school-navy">Notifications</h2>
            </div>
            <span className="rounded-full bg-school-mist px-3 py-1 text-xs font-bold text-school-blue">3 new</span>
          </div>
          <div className="mt-5 grid gap-3">
            {notifications.map((item) => (
              <div key={item.title} className="flex gap-3 rounded-lg border border-slate-100 bg-slate-50 p-4">
                <div className={`grid h-10 w-10 shrink-0 place-items-center rounded-lg ${tones[item.tone]}`}>
                  <Icon name={item.icon} className="h-5 w-5" />
                </div>
                <div>
                  <p className="font-bold text-school-navy">{item.title}</p>
                  <p className="mt-1 text-sm leading-relaxed text-slate-500">{item.text}</p>
                </div>
              </div>
            ))}
          </div>
        </article>
      );
    }

    function CalendarPanel() {
      return (
        <article className="rounded-lg border border-slate-200 bg-white p-5 shadow-soft">
          <p className="text-xs font-extrabold uppercase tracking-[0.16em] text-school-gold">Calendar</p>
          <h2 className="mt-2 text-xl font-extrabold text-school-navy">This Week</h2>
          <div className="mt-5 grid gap-3">
            {calendarItems.map((item) => (
              <div key={item.title} className="flex gap-3 rounded-lg border border-slate-100 p-3 transition hover:bg-slate-50">
                <div className="grid h-14 w-14 shrink-0 place-items-center rounded-lg bg-school-mist text-center">
                  <span className="text-[11px] font-extrabold uppercase text-school-blue">{item.day}</span>
                  <span className="-mt-2 text-lg font-extrabold text-school-navy">{item.date}</span>
                </div>
                <div>
                  <p className="font-bold text-school-navy">{item.title}</p>
                  <p className="mt-1 text-sm text-slate-500">{item.time}</p>
                </div>
              </div>
            ))}
          </div>
        </article>
      );
    }

    function Dashboard() {
      const [active, setActive] = useState("Overview");
      const [sidebarOpen, setSidebarOpen] = useState(false);
      const newsPostsCount = JSON.parse(localStorage.getItem("schoolNews") || "[]").length;

      useEffect(() => {
        if (window.lucide) window.lucide.createIcons();
      });

      return (
        <div className="min-h-screen md:grid md:grid-cols-[288px_minmax(0,1fr)]">
          <Sidebar active={active} setActive={setActive} open={sidebarOpen} setOpen={setSidebarOpen} />

          <main className="min-w-0">
            <header className="sticky top-0 z-20 border-b border-slate-200/80 bg-[#f7f9fd]/90 px-4 py-4 backdrop-blur-xl lg:px-8">
              <div className="flex flex-col gap-4 lg:flex-row lg:items-center lg:justify-between">
                <div className="flex items-center gap-3">
                  <button onClick={() => setSidebarOpen(true)} className="grid h-11 w-11 place-items-center rounded-lg border border-slate-200 bg-white text-school-navy md:hidden" aria-label="Open menu">
                    <Icon name="Menu" />
                  </button>
                  <div>
                    <p className="text-xs font-extrabold uppercase tracking-[0.16em] text-school-gold">School Dashboard</p>
                    <h1 className="text-2xl font-extrabold text-school-navy lg:text-3xl">Good day, ES Kabirizi team</h1>
                  </div>
                </div>
                <div className="flex flex-col gap-3 sm:flex-row sm:items-center">
                  <label className="flex min-h-[46px] items-center gap-2 rounded-full border border-slate-200 bg-white px-4 text-sm text-slate-500 shadow-sm">
                    <Icon name="Search" className="h-4 w-4" />
                    <input placeholder="Search dashboard" className="w-full bg-transparent outline-none sm:w-56" />
                  </label>
                  <div className="flex items-center gap-3 rounded-full border border-slate-200 bg-white py-1 pl-1 pr-4 shadow-sm">
                    <div className="grid h-10 w-10 place-items-center rounded-full bg-school-mist font-extrabold text-school-blue">ES</div>
                    <div>
                      <p className="text-sm font-bold text-school-navy">School Office</p>
                      <p className="text-xs text-slate-500">Admin workspace</p>
                    </div>
                  </div>
                  <a href="admin.html" className="inline-flex min-h-[46px] items-center gap-2 rounded-full border border-slate-200 bg-white px-4 text-sm font-bold text-school-navy hover:bg-slate-50">
                    <Icon name="ShieldCheck" /> Admin panel
                  </a>
                </div>
              </div>
            </header>

            <div className="space-y-5 p-4 lg:p-8">
              <section className="animate-rise overflow-hidden rounded-lg bg-school-navy shadow-lift">
                <div className="grid gap-6 p-6 text-white lg:grid-cols-[1fr_360px] lg:p-8">
                  <div>
                    <p className="text-xs font-extrabold uppercase tracking-[0.18em] text-[#f5df9f]">Modern school management</p>
                    <h2 className="mt-3 max-w-3xl text-3xl font-extrabold leading-tight lg:text-5xl">Manage attendance, results, students, and communication in one calm workspace.</h2>
                    <p className="mt-4 max-w-2xl leading-relaxed text-white/75">A clean SaaS-style dashboard for school leaders, designed with ES Kabirizi colors, fast scanning, and responsive access from phone or desktop.</p>
                    <div className="mt-6 flex flex-wrap gap-3">
                      <a href="admin.html" className="inline-flex min-h-[46px] items-center gap-2 rounded-full bg-[#f5df9f] px-5 font-extrabold text-school-navy transition hover:-translate-y-0.5">
                        <Icon name="PlusCircle" /> Publish Update
                      </a>
                      <a href="index.html" className="inline-flex min-h-[46px] items-center gap-2 rounded-full border border-white/30 px-5 font-extrabold text-white transition hover:-translate-y-0.5 hover:bg-white/10">
                        <Icon name="Globe2" /> View Website
                      </a>
                    </div>
                  </div>
                  <div className="rounded-lg border border-white/15 bg-white/10 p-5 backdrop-blur">
                    <p className="text-sm font-bold text-[#f5df9f]">Today at a glance</p>
                    <div className="mt-5 grid gap-4">
                      <div className="flex items-center justify-between border-b border-white/10 pb-3"><span className="text-white/70">Attendance</span><strong>94%</strong></div>
                      <div className="flex items-center justify-between border-b border-white/10 pb-3"><span className="text-white/70">Pending messages</span><strong>18</strong></div>
                      <div className="flex items-center justify-between"><span className="text-white/70">Upcoming events</span><strong>3</strong></div>
                    </div>
                  </div>
                </div>
              </section>

              <section className="grid gap-4 sm:grid-cols-2 xl:grid-cols-4">
                <KpiCard icon="UsersRound" label="Students" value="850+" change="+34 term" tone="bg-blue-50 text-blue-700" />
                <KpiCard icon="CalendarCheck" label="Attendance" value="94%" change="+2.1%" tone="bg-emerald-50 text-emerald-700" />
                <KpiCard icon="Newspaper" label="News Posts" value={newsPostsCount} change="Published" tone="bg-purple-50 text-purple-700" />
                <KpiCard icon="Award" label="Performance" value="86%" change="+4.6%" tone="bg-amber-50 text-amber-700" />
                <KpiCard icon="GraduationCap" label="Teachers" value="42" change="Active" tone="bg-indigo-50 text-indigo-700" />
              </section>

              <section className="grid gap-5 xl:grid-cols-2">
                <ChartCard title="Attendance Trends" subtitle="Weekly view" type="attendance" />
                <ChartCard title="Academic Results" subtitle="Department average" type="results" />
              </section>

              <section className="grid gap-5 xl:grid-cols-[minmax(0,1.45fr)_minmax(320px,.55fr)]">
                <StudentTable />
                <div className="grid gap-5">
                  <Notifications />
                  <CalendarPanel />
                </div>
              </section>
            </div>
          </main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<Dashboard />);
  </script>
</body>
</html>
